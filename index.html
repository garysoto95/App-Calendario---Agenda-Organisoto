<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>OrganiSoto — Gestor de alarmas, calendario, agenda y proyectos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit',system-ui,sans-serif;}
:root{
  --bg:#0c0b14;--bg2:#110f20;--bg3:#17152b;--card:#1c192e;--card2:#201d35;
  --pu:#6c63b8;--pu2:#9990d4;--pu3:#3d3875;--pu4:#2a2655;
  --gr:#2a8c6e;--gr2:#4ab897;--gr3:#1a5c48;
  --tx:#d4d0f0;--tx2:#8a85b8;--tx3:#55517a;
  --bd:rgba(108,99,184,0.18);--bd2:rgba(108,99,184,0.32);
  --blur:blur(14px);
}
body{background:var(--bg);color:var(--tx);min-height:100vh;}
.app{max-width:1080px;margin:0 auto;padding-bottom:40px;}

/* ===== HEADER ===== */
.hdr{
  background:rgba(17,15,32,0.72);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--bd);
  padding:11px 18px;
  display:flex;
  align-items:center;
  position:sticky;top:0;z-index:100;
}
.logo-wrap{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
}
.logo-icon{
  width:28px;height:28px;
  animation: logoSpin 6s linear infinite, logoColorCycle 4s ease-in-out infinite;
}
@keyframes logoSpin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
@keyframes logoColorCycle{
  0%{filter:hue-rotate(0deg) brightness(1);}
  25%{filter:hue-rotate(60deg) brightness(1.2);}
  50%{filter:hue-rotate(120deg) brightness(1);}
  75%{filter:hue-rotate(200deg) brightness(1.2);}
  100%{filter:hue-rotate(360deg) brightness(1);}
}
.logo{font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--pu2),var(--gr2),var(--pu2));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoTextShimmer 3s linear infinite;
}
@keyframes logoTextShimmer{
  0%{background-position:0%}100%{background-position:200%}
}
.logo em{font-style:normal;}
.clk{font-size:12px;color:var(--tx3);margin-left:auto;letter-spacing:1px;font-variant-numeric:tabular-nums;}

/* ===== TABS ===== */
.tabs{
  display:flex;
  background:rgba(17,15,32,0.6);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--bd);
}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab svg{width:14px;height:14px;flex-shrink:0;}
.tab:hover{color:var(--pu2);}
.tab.on{color:var(--pu2);border-bottom-color:var(--pu);}

.sec{display:none;padding:16px;}
.sec.on{display:block;}

.card{background:rgba(28,25,46,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.row1{margin-bottom:10px;}

input[type=text],input[type=url],input[type=date],select,textarea{
  width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;
  color:var(--tx);padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s;
  font-family:'Outfit',sans-serif;
}
input:focus,select:focus,textarea:focus{border-color:var(--pu);box-shadow:0 0 0 2px rgba(108,99,184,0.12);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7);}
select option{background:var(--bg2);}

.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--pu3);background:rgba(108,99,184,0.12);color:var(--pu2);font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-family:'Outfit',sans-serif;}
.btn:hover{background:rgba(108,99,184,0.28);transform:translateY(-1px);}
.btn-g{border-color:var(--gr3);background:rgba(42,140,110,0.12);color:var(--gr2);}
.btn-g:hover{background:rgba(42,140,110,0.28);}
.btn-xs{padding:5px 12px;font-size:10px;}
.btn-red{border-color:#5a2030;background:rgba(180,40,60,0.1);color:#c0405a;}

/* ADD ALARM BTN */
.add-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 16px;border:1px dashed var(--bd2);border-radius:10px;color:var(--tx3);font-size:12px;letter-spacing:1px;transition:all .25s;margin-bottom:14px;background:transparent;}
.add-row:hover{border-color:var(--pu);color:var(--pu2);background:rgba(108,99,184,0.06);}
.add-row svg{width:20px;height:20px;flex-shrink:0;}

/* ALARM CARDS GRID */
.alarm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:4px;}
.alarm-card{border-radius:14px;padding:14px 14px 12px;position:relative;display:flex;flex-direction:column;gap:6px;transition:transform .18s,box-shadow .18s;cursor:default;border:1px solid transparent;}
.alarm-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
.alarm-card-time{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1;}
.alarm-card-name{font-size:11px;opacity:.85;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alarm-card-actions{display:flex;align-items:center;gap:6px;margin-top:4px;}
.tog{width:34px;height:19px;background:rgba(0,0,0,0.25);border-radius:10px;border:1px solid rgba(255,255,255,0.15);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:rgba(255,255,255,0.28);}
.tog::after{content:'';position:absolute;width:13px;height:13px;background:rgba(255,255,255,0.5);border-radius:50%;top:2px;left:2px;transition:left .2s;}
.tog.on::after{left:17px;background:#fff;}
.xbtn{background:rgba(0,0,0,0.2);border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.xbtn:hover{background:rgba(180,40,60,0.45);color:#fff;}
.xbtn svg{width:11px;height:11px;}
.alarm-col-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;gap:3px;margin-left:auto;}
.alarm-col-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);transition:transform .15s;}
.alarm-col-dot:hover{transform:scale(1.3);}
.alarm-col-popup{display:none;position:absolute;bottom:calc(100% + 6px);right:0;background:rgba(17,15,32,0.96);backdrop-filter:blur(14px);border:1px solid var(--bd2);border-radius:10px;padding:8px 10px;z-index:300;box-shadow:0 6px 24px rgba(0,0,0,0.5);}
.alarm-col-popup.open{display:flex;gap:6px;flex-wrap:wrap;width:120px;}
.alarm-col-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.alarm-col-swatch:hover{transform:scale(1.2);}
.alarm-col-swatch.sel{border-color:#fff;transform:scale(1.15);}
.alarm-edit-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.alarm-edit-overlay.open{display:flex;}
.alarm-edit-box{background:rgba(22,20,38,0.98);border:1px solid var(--bd2);border-radius:16px;padding:20px;width:300px;max-width:92vw;box-shadow:0 12px 48px rgba(0,0,0,0.6);animation:drumIn .2s ease-out;}
.alarm-edit-box .lbl{margin-bottom:5px;margin-top:10px;}

/* DRUM TIME PICKER */
.drum-wrap{
  background:rgba(28,25,46,0.8);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--bd2);
  border-radius:16px;
  padding:20px;
  margin-bottom:14px;
  display:none;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
}
.drum-wrap.open{display:block;animation:drumIn .25s ease-out;}
@keyframes drumIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.drum-pickers{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:18px;}
.drum-sep{font-size:30px;color:var(--pu2);font-weight:300;padding:0 6px;animation:sepPulse 2s ease-in-out infinite;}
@keyframes sepPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.drum-vp{height:130px;overflow:hidden;position:relative;width:76px;cursor:ns-resize;}
.drum-hl{
  position:absolute;top:45px;left:0;right:0;height:42px;
  border-top:1px solid rgba(108,99,184,0.35);
  border-bottom:1px solid rgba(108,99,184,0.35);
  background:rgba(108,99,184,0.07);
  pointer-events:none;
  border-radius:6px;
}
.drum-track{display:flex;flex-direction:column;user-select:none;}
.drum-item{height:42px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--tx3);flex-shrink:0;font-variant-numeric:tabular-nums;transition:all .12s;}
.drum-item.sel{color:var(--pu2);font-size:30px;font-weight:600;text-shadow:0 0 20px rgba(108,99,184,0.5);}
.snd-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.snd-opt{padding:5px 12px;border-radius:12px;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:.5px;font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:4px;}
.snd-opt svg{width:10px;height:10px;}
.snd-opt.on{border-color:var(--gr3);color:var(--gr2);background:rgba(42,140,110,0.1);}
.snd-opt:hover{border-color:var(--pu);color:var(--pu2);}
.drum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

/* CALENDARIO */
.cal-nav-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cal-nbtn{background:transparent;border:1px solid var(--bd);color:var(--pu2);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:4px;}
.cal-nbtn:hover{background:rgba(108,99,184,0.12);border-color:var(--pu);}
.cal-month{font-size:15px;font-weight:600;color:var(--tx);letter-spacing:2px;text-transform:uppercase;flex:1;text-align:center;}
.cgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;}
.dow{text-align:center;font-size:9px;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;padding:6px 0;}
.cday{min-height:70px;background:rgba(28,25,46,0.6);border:1px solid rgba(108,99,184,0.1);border-radius:8px;padding:6px;cursor:pointer;transition:all .2s;overflow:hidden;backdrop-filter:blur(4px);}
.cday:hover{border-color:var(--pu);background:rgba(108,99,184,0.08);transform:translateY(-1px);}
.cday.today{border-color:var(--gr);}
.cday.dim{opacity:0.2;pointer-events:none;}
.cday.sel{border-color:var(--pu);background:rgba(108,99,184,0.12);}
.day-header{display:flex;justify-content:space-between;align-items:center;}
.dnum{font-size:11px;color:var(--tx3);font-weight:500;}
.cday.today .dnum{color:var(--gr2);font-weight:700;}
.day-dots{display:flex;gap:2px;flex-wrap:wrap;margin-left:4px;}
.ddot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.event-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
  max-height: 42px;
  overflow-y: auto;
}
.dchip {
  display: inline-flex;
  align-items: center;
  background: rgba(108,99,184,0.2);
  border-radius: 16px;
  padding: 2px 8px;
  font-size: 9px;
  font-weight: 500;
  color: var(--pu2);
  white-space: nowrap;
  border: 1px solid rgba(108,99,184,0.3);
  width: auto;
}
.dchip.b-trabajo { background: rgba(108,99,184,0.25); color: var(--pu2); }
.dchip.b-proyecto { background: rgba(186,117,23,0.25); color: #d4a04a; }
.dchip.b-personal { background: rgba(42,140,110,0.25); color: var(--gr2); }
.dchip.b-cita { background: rgba(180,80,140,0.25); color: #cc88bb; }

/* DAY PANEL - LISTA VERTICAL ORIGINAL */
.day-panel{
  background:rgba(17,15,32,0.78);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--bd2);
  border-radius:14px;
  padding:18px;
  margin-top:14px;
  animation:panelIn .2s ease-out;
}
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.dp-ttl{font-size:15px;color:var(--pu2);letter-spacing:1px;font-weight:600;}
.hr-row{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(108,99,184,0.06);}
.hr-lbl{
  font-size:10px;
  color:var(--tx3);
  min-width:38px;
  display:flex;
  align-items:center;
  gap:3px;
  transition:all 0.1s;
  cursor:pointer;
  background:transparent;
  border:none;
  font-family:'Outfit',sans-serif;
}
.hr-lbl.highlight{color:var(--gr2);text-shadow:0 0 3px var(--gr);font-weight:600;}
.hr-inp{
  flex:1;
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(108,99,184,0.1);
  color:var(--tx);
  font-size:12px;
  padding:3px 2px;
  outline:none;
  font-family:'Outfit',sans-serif;
  transition:border-color .2s;
}
.hr-inp:focus{border-bottom-color:var(--pu);}
.postit-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:8px 0;}
.postit-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.postit{border-radius:8px;padding:8px 10px;min-width:92px;max-width:130px;min-height:66px;font-size:11px;position:relative;word-break:break-word;backdrop-filter:blur(6px);}
.postit-x{position:absolute;top:4px;right:5px;cursor:pointer;background:none;border:none;color:inherit;opacity:.5;transition:opacity .15s;display:flex;align-items:center;}
.postit-x:hover{opacity:1;}
.postit-x svg{width:10px;height:10px;}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .15s;}
.cdot:hover{transform:scale(1.2);}
.cdot.sel{border-color:#fff;transform:scale(1.15);}

/* AGENDA */
.ag-day-block{
  background:rgba(28,25,46,0.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--bd);
  border-radius:12px;
  margin-bottom:10px;
  overflow:hidden;
}
.ag-day-block:hover{border-color:var(--bd2);}
.ag-day-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  background:rgba(32,29,53,0.5);
  transition:background .2s;
}
.ag-day-head:hover{background:rgba(32,29,53,0.8);}
.ag-day-date{font-size:13px;font-weight:600;color:var(--pu2);flex:1;}
.ag-day-count{font-size:11px;color:var(--tx3);}
.ag-day-chev{transition:transform .25s;display:flex;color:var(--tx3);}
.ag-day-chev svg{width:14px;height:14px;}
.ag-day-body{display:none;padding:8px 14px 12px;}
.ag-day-body.open{display:block;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.ev-card{background:rgba(28,25,46,0.5);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;}
.ev-time{font-size:11px;color:var(--gr2);min-width:44px;font-weight:600;font-variant-numeric:tabular-nums;}
.ev-info{flex:1;}
.ev-ttl{font-size:13px;color:var(--tx);}
.ev-dsc{font-size:11px;color:var(--tx3);margin-top:2px;}
.badge{font-size:9px;padding:2px 7px;border-radius:8px;letter-spacing:.8px;text-transform:uppercase;}
.b-trabajo{background:rgba(108,99,184,0.18);color:var(--pu2);}
.b-proyecto{background:rgba(186,117,23,0.18);color:#d4a04a;}
.b-personal{background:rgba(42,140,110,0.18);color:var(--gr2);}
.b-cita{background:rgba(180,80,140,0.18);color:#cc88bb;}
.sec-lbl{font-size:10px;letter-spacing:2px;color:var(--gr2);text-transform:uppercase;margin-bottom:8px;padding-left:10px;border-left:2px solid var(--gr);margin-top:16px;}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:12px;}
.empty svg{width:36px;height:36px;opacity:.3;margin:0 auto 10px;display:block;}

.add-ev-panel{
  background:rgba(17,15,32,0.8);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--bd2);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
  display:none;
}
.add-ev-panel.open{display:block;animation:drumIn .25s ease-out;}
.add-ev-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 16px;border:1px dashed var(--bd2);border-radius:10px;color:var(--tx3);font-size:12px;letter-spacing:1px;transition:all .25s;margin-bottom:14px;background:transparent;}
.add-ev-toggle:hover{border-color:var(--pu);color:var(--pu2);background:rgba(108,99,184,0.06);}
.add-ev-toggle svg{width:20px;height:20px;}

.notif-area{position:relative;z-index:10;}
.notif-box{
  background:rgba(17,15,32,0.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--pu);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:8px;
  animation:notifIn .3s ease-out;
  box-shadow:0 4px 24px rgba(108,99,184,0.25);
}
@keyframes notifIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.notif-ttl{font-size:13px;font-weight:600;color:var(--pu2);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.notif-ttl svg{width:14px;height:14px;}
.notif-bdy{font-size:11px;color:var(--tx2);}
.notif-acts{display:flex;gap:6px;margin-top:10px;}
.notif-time-badge{font-size:10px;color:var(--gr2);background:rgba(42,140,110,0.12);border:1px solid rgba(42,140,110,0.25);border-radius:6px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;margin-top:4px;}
.notif-time-badge svg{width:10px;height:10px;}

.perm-banner{background:rgba(42,140,110,0.1);border:1px solid rgba(42,140,110,0.3);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gr2);}
.perm-banner svg{width:18px;height:18px;flex-shrink:0;}

/* PROYECTOS */
.section-panel{background:rgba(28,25,46,0.55);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:14px;padding:14px;}
.section-panel-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--pu2);margin-bottom:12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd);padding-bottom:10px;}
.section-panel-title svg{width:13px;height:13px;}
.proj-add-row{display:flex;gap:7px;align-items:flex-end;margin-bottom:12px;}
.proj-add-row input{flex:1;}
.proj-list{display:flex;flex-direction:column;gap:8px;}
.proj-entry{
  background:rgba(32,29,53,0.7);
  border:1px solid var(--bd);
  border-radius:10px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  animation:fadeIn .2s ease-out;
  flex-wrap:wrap;
}
.proj-date{font-size:10px;color:var(--gr2);min-width:72px;font-weight:600;}
.proj-title{font-size:12px;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-actions{display:flex;gap:8px;margin-left:auto;align-items:center;}
.proj-status-select{font-size:10px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx2);padding:4px 7px;cursor:pointer;min-width:110px;}

  <div class="tab" onclick="goTab('agenda',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>Agenda</div>

<div class="sec on" id="tab-alarmas">
  <div class="add-row" onclick="toggleDrum()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>Agregar alarma</span></div>
  <div class="drum-wrap" id="drumWrap"><div class="drum-pickers"><div><div class="drum-vp" id="vpH"><div class="drum-hl"></div><div class="drum-track" id="trkH"></div></div></div><div class="drum-sep">:</div><div><div class="drum-vp" id="vpM"><div class="drum-hl"></div><div class="drum-track" id="trkM"></div></div></div></div><div class="drum-grid"><div><div class="lbl">Nombre</div><input type="text" id="dName" placeholder="Ej: Despertar" /></div><div><div class="lbl">Categoría</div><select id="dCat"><option value="rutina">Rutina diaria</option><option value="trabajo">Trabajo</option><option value="recordatorio">Recordatorio</option><option value="custom">Personalizada</option></select></div><div><div class="lbl">Días</div><select id="dDays"><option value="Todos los días">Todos los días</option><option value="Lun–Vie">Lun – Vie</option><option value="Sáb–Dom">Sáb – Dom</option><option value="Una vez">Una vez</option></select></div><div><div class="lbl">Sonido</div><div class="snd-opts"><button class="snd-opt on" onclick="selSnd(this,'beep')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"/></svg> Beep</button><button class="snd-opt" onclick="selSnd(this,'chime')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Chime</button><button class="snd-opt" onclick="selSnd(this,'pulse')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg> Pulso</button><button class="snd-opt" onclick="selSnd(this,'none')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/></svg> Mudo</button></div></div></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;"><button class="btn btn-xs" onclick="toggleDrum()">Cancelar</button><button class="btn btn-xs" onclick="testSnd()">Probar sonido</button><button class="btn btn-g btn-xs" onclick="saveAlarm()">Guardar alarma</button></div></div>
  <div id="alarmGroups"></div>
  <div class="alarm-edit-overlay" id="alarmEditOverlay"><div class="alarm-edit-box"><div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;">Editar alarma</div><div class="drum-pickers" style="margin-bottom:16px;"><div class="drum-vp" id="vpHE" style="width:70px;height:120px;"><div class="drum-hl"></div><div class="drum-track" id="trkHE"></div></div><div class="drum-sep">:</div><div class="drum-vp" id="vpME" style="width:70px;height:120px;"><div class="drum-hl"></div><div class="drum-track" id="trkME"></div></div></div><div class="lbl">Nombre</div><input type="text" id="editName" placeholder="Nombre de la alarma" /><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;"><button class="btn btn-xs" onclick="closeAlarmEdit()">Cancelar</button><button class="btn btn-g btn-xs" onclick="saveAlarmEdit()">Guardar</button></div></div></div>

<div class="sec" id="tab-agenda"><div class="add-ev-toggle" onclick="openAddEventPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>Agregar actividad o cita</span></div><div class="add-ev-panel" id="addEvPanel"><div class="row2"><div><div class="lbl">Fecha</div><input type="date" id="evDate" /></div><div><div class="lbl">Hora</div><input type="text" id="evTimeDisplay" placeholder="08:00" readonly onclick="toggleTimeMini()" style="cursor:pointer;" /><input type="hidden" id="evTime" /><div id="timeMiniPop" style="display:none;position:absolute;z-index:200;background:rgba(17,15,32,0.95);backdrop-filter:blur(18px);border:1px solid var(--bd2);border-radius:12px;padding:14px 10px;"><div style="display:flex;justify-content:center;gap:6px;"><div class="drum-vp" id="vpEH" style="width:60px;height:110px;"><div class="drum-hl"></div><div class="drum-track" id="trkEH"></div></div><div style="font-size:24px;color:var(--pu2);">:</div><div class="drum-vp" id="vpEM" style="width:60px;height:110px;"><div class="drum-hl"></div><div class="drum-track" id="trkEM"></div></div></div><div style="display:flex;justify-content:flex-end;margin-top:6px;"><button class="btn btn-xs" onclick="closeTimeMini()">OK</button></div></div></div></div><div class="row1"><div class="lbl">Título</div><input type="text" id="evTitle" placeholder="Reunión, cita médica..." /></div><div class="row2"><div><div class="lbl">Descripción</div><input type="text" id="evDesc" placeholder="Opcional" /></div><div><div class="lbl">Categoría</div><select id="evCat"><option value="trabajo">Trabajo</option><option value="proyecto">Proyecto</option><option value="personal">Personal</option><option value="cita">Cita</option></select></div></div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn btn-xs" onclick="cancelEditAndClose()">Cancelar</button><button class="btn btn-g" id="saveEventBtn" onclick="addOrUpdateEvent()">Guardar evento</button></div></div><div id="agList"></div></div>

<script>
const ls=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
const lss=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const gA=()=>ls('os2_alarms')||[];
const sA=v=>lss('os2_alarms',v);
const gEv=()=>ls('os2_events')||[];
const sEv=v=>lss('os2_events',v);
const gD=d=>ls('os2_d_'+d)||{hours:{},postits:[]};
const sD=(d,v)=>lss('os2_d_'+d,v);
const gPr=()=>ls('os2_projects')||[];
const sPr=v=>lss('os2_projects',v);
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ALARM_COLS=['#6c63b8','#39ff14','#8a5a8a','#b06a20','#00ced1','#8c3050','#cc44ff','#1a1a2e','#f0f0f0','#ffe600'];
const PCOLS=['#6c63b8','#2a8c6e','#8a5a8a','#8c6a2a','#2a608c','#8c3050'];
let calDate=new Date(), selDay=null, selPCol=PCOLS[0], drumSnd='beep', dH=7,dM=0, evH=8,evM=0, editH=7,editM=0, editIdx=-1;
let editingEventId = null;

setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
function goTab(id,el){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');el.classList.add('on');if(id==='calendario')renderCal();if(id==='agenda')renderAgenda();if(id==='alarmas')renderAlarms();if(id==='proyectos')renderProjects();}
function checkPermBanner(){if('Notification' in window && Notification.permission==='default')document.getElementById('permBanner').style.display='flex';}
function askPushPerm(){if(!('Notification' in window))return;Notification.requestPermission().then(p=>{if(p==='granted'){document.getElementById('permBanner').style.display='none';new Notification('OrganiSoto',{body:'¡Notificaciones activadas!'});}});}
function sendPushNotif(title,body){if('Notification' in window && Notification.permission==='granted')new Notification('OrganiSoto – '+title,{body,tag:'os-'+Date.now()});}
checkPermBanner();
function makeDrum(trackId,vpId,items,initVal,cb){const track=document.getElementById(trackId),vp=document.getElementById(vpId);const PAD=2,IH=42,HL_TOP=45;track.innerHTML='';[...Array(PAD).fill(null),...items,...Array(PAD).fill(null)].forEach(v=>{const el=document.createElement('div');el.className='drum-item';el.textContent=v!==null?v:'';track.appendChild(el);});let cur=initVal;const setPos=idx=>{cur=Math.max(0,Math.min(items.length-1,idx));track.style.transform=`translateY(${HL_TOP-(PAD+cur)*IH}px)`;track.querySelectorAll('.drum-item').forEach((el,i)=>el.classList.toggle('sel',i-PAD===cur));cb(cur);};setPos(initVal);let sy=0,sc=0,drag=false;const onMove=e=>{if(!drag)return;const y=e.touches?e.touches[0].clientY:e.clientY;const diff=y-sy;setPos(Math.round(sc-diff/IH));};const onEnd=()=>{drag=false;};vp.addEventListener('mousedown',e=>{drag=true;sy=e.clientY;sc=cur;e.preventDefault();});vp.addEventListener('touchstart',e=>{drag=true;sy=e.touches[0].clientY;sc=cur;},{passive:true});document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onEnd);document.addEventListener('touchmove',e=>{if(drag){onMove(e);e.preventDefault();}},{passive:false});document.addEventListener('touchend',onEnd);}
function initDrums(){const H=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')),M=Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));makeDrum('trkH','vpH',H,dH,v=>{dH=v;});makeDrum('trkM','vpM',M,dM,v=>{dM=v;});}
let drumOpen=false;function toggleDrum(){drumOpen=!drumOpen;document.getElementById('drumWrap').className='drum-wrap'+(drumOpen?' open':'');if(drumOpen)initDrums();}
function selSnd(el,s){drumSnd=s;el.closest('.snd-opts').querySelectorAll('.snd-opt').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function testSnd(){playSound(drumSnd);}
function playSound(type){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(type==='beep'){o.type='square';o.frequency.value=780;g.gain.setValueAtTime(0.22,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.45);o.start();o.stop(ctx.currentTime+0.45);}else if(type==='chime'){o.type='sine';o.frequency.value=528;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);o.start();o.stop(ctx.currentTime+1.4);}else if(type==='pulse'){o.type='sawtooth';o.frequency.setValueAtTime(420,ctx.currentTime);o.frequency.setValueAtTime(640,ctx.currentTime+0.18);g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.7);o.start();o.stop(ctx.currentTime+0.7);}}catch(e){}}
function saveAlarm(){const name=document.getElementById('dName').value.trim();if(!name){document.getElementById('dName').focus();return;}const hh=String(dH).padStart(2,'0'),mm=String(dM).padStart(2,'0');const alarms=gA();alarms.push({id:Date.now(),time:hh+':'+mm,name,cat:document.getElementById('dCat').value,days:document.getElementById('dDays').value,sound:drumSnd,on:true});sA(alarms);document.getElementById('dName').value='';toggleDrum();renderAlarms();}
function renderAlarms(){const alarms=gA(),container=document.getElementById('alarmGroups');if(!alarms.length){container.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Sin alarmas aún.</div>';return;}container.innerHTML=`<div class="alarm-grid">${alarms.map((a,i)=>{const col=a.color||ALARM_COLS[0];return`<div class="alarm-card" style="background:${col}22;border-color:${col}55;"><div class="alarm-card-time" style="color:${col};">${a.time}</div><div class="alarm-card-name" style="color:${col}cc;">${a.name}</div><div class="alarm-card-actions"><div class="tog${a.on?' on':''}" onclick="togA(${i})"></div><button class="xbtn" onclick="delA(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg></button><button class="xbtn" onclick="openAlarmEdit(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><div style="position:relative;"><button class="xbtn" onclick="toggleAlarmCol(event,${i})" style="color:${col};"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></button><div class="alarm-col-popup" id="acp-${i}">${ALARM_COLS.map(c=>`<div class="alarm-col-swatch${c===col?' sel':''}" style="background:${c};" onclick="setAlarmCol(event,${i},'${c}')"></div>`).join('')}</div></div></div></div>`}).join('')}</div>`;}
let openColIdx=-1;function toggleAlarmCol(e,i){e.stopPropagation();if(openColIdx>=0){const prev=document.getElementById('acp-'+openColIdx);if(prev)prev.classList.remove('open');}openColIdx=openColIdx===i?-1:i;if(openColIdx>=0){const pop=document.getElementById('acp-'+i);if(pop)pop.classList.add('open');}}document.addEventListener('click',function(e){if(openColIdx>=0){const pop=document.getElementById('acp-'+openColIdx);if(pop && !pop.contains(e.target)){if(pop)pop.classList.remove('open');openColIdx=-1;}}});
function setAlarmCol(e,i,col){e.stopPropagation();const alarms=gA();alarms[i].color=col;sA(alarms);if(openColIdx>=0){const pop=document.getElementById('acp-'+openColIdx);if(pop)pop.classList.remove('open');openColIdx=-1;}renderAlarms();}
function togA(i){const a=gA();a[i].on=!a[i].on;sA(a);renderAlarms();}function delA(i){if(!confirm('¿Eliminar?'))return;const a=gA();a.splice(i,1);sA(a);renderAlarms();}
function openAlarmEdit(i){editIdx=i;const a=gA()[i];const[hStr,mStr]=a.time.split(':');editH=parseInt(hStr,10);editM=parseInt(mStr,10);document.getElementById('editName').value=a.name;document.getElementById('alarmEditOverlay').classList.add('open');const H=Array.from({length:24},(_,j)=>String(j).padStart(2,'0')),M=Array.from({length:60},(_,j)=>String(j).padStart(2,'0'));makeDrum('trkHE','vpHE',H,editH,v=>{editH=v;});makeDrum('trkME','vpME',M,editM,v=>{editM=v;});}function closeAlarmEdit(){editIdx=-1;document.getElementById('alarmEditOverlay').classList.remove('open');}
function saveAlarmEdit(){if(editIdx<0)return;const alarms=gA();alarms[editIdx].name=document.getElementById('editName').value.trim()||alarms[editIdx].name;alarms[editIdx].time=String(editH).padStart(2,'0')+':'+String(editM).padStart(2,'0');sA(alarms);closeAlarmEdit();renderAlarms();}
setInterval(()=>{const n=new Date();if(n.getSeconds()>8)return;const hhmm=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');gA().forEach(a=>{if(a.on&&a.time===hhmm){showNotif(a);}});},15000);
function showNotif(a){const area=document.getElementById('notifArea');const box=document.createElement('div');box.className='notif-box';box.innerHTML=`<div class="notif-ttl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>${a.name}</div><div class="notif-bdy">${a.days}</div><div class="notif-time-badge">⏱ ${a.time}</div><div class="notif-acts"><button class="btn btn-xs" onclick="this.closest('.notif-box').remove()">Descartar</button></div>`;area.prepend(box);if(a.sound&&a.sound!=='none')playSound(a.sound);sendPushNotif(a.name,`Alarma a las ${a.time}`);setTimeout(()=>box.remove&&box.remove(),14000);}
function dStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function chMon(d){calDate.setMonth(calDate.getMonth()+d);renderCal();}
function renderCal(){document.getElementById('calLbl').textContent=MONTHS[calDate.getMonth()]+' '+calDate.getFullYear();const g=document.getElementById('cgrid');g.innerHTML=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="dow">${d}</div>`).join('');const y=calDate.getFullYear(),m=calDate.getMonth();let dow=new Date(y,m,1).getDay();dow=dow===0?6:dow-1;const dim=new Date(y,m+1,0).getDate();const today=new Date();const evs=gEv();for(let i=0;i<dow;i++){g.innerHTML+=`<div class="cday dim"><div class="dnum">${new Date(y,m,1-(dow-i)).getDate()}</div></div>`;}for(let d=1;d<=dim;d++){const date=new Date(y,m,d);const ds=dStr(date);const isToday=date.toDateString()===today.toDateString();const isSel=selDay===ds;const dd=gD(ds);const posts=dd.postits||[];const dots=posts.slice(0,3).map(p=>`<div class="ddot" style="background:${p.color};"></div>`).join('');const dayEvents=evs.filter(e=>e._ds===ds).slice(0,3); // max 3 chips
const chipsHtml=dayEvents.map(e=>`<span class="dchip b-${e.cat}">${e.time?e.time.substring(0,5):'--:--'}</span>`).join('');
g.innerHTML+=`<div class="cday${isToday?' today':''}${isSel?' sel':''}" onclick="openDay('${ds}','${d} de ${MONTHS[m]}')"><div class="day-header"><span class="dnum">${d}</span><div class="day-dots">${dots}</div></div><div class="event-chips">${chipsHtml}</div></div>`;}const rem=(7-(dow+dim)%7)%7;for(let i=1;i<=rem;i++){g.innerHTML+=`<div class="cday dim"><div class="dnum">${new Date(y,m+1,i).getDate()}</div></div>`;}}
function guardarYDia(ds,label){ // Guarda los cambios del horario personal y eventos asociados
  const panelDiv=document.querySelector('.day-panel');
  if(panelDiv){
    const rows=panelDiv.querySelectorAll('.hr-row');
    rows.forEach(row=>{
      const lblElem=row.querySelector('.hr-lbl');
      const inp=row.querySelector('.hr-inp');
      if(lblElem && inp){
        const hora=lblElem.innerText.replace('⏱','').trim();
        const newTitle = inp.value.trim();
        const evs = gEv();
        const existingIdx = evs.findIndex(e=>e._ds===ds && e.time===hora);
        if(newTitle === ""){
          if(existingIdx !== -1){
            const deletedId = evs[existingIdx].id;
            evs.splice(existingIdx,1);
            sEv(evs);
            deleteEventFromDOM(deletedId);
          }
        } else {
          if(existingIdx !== -1){
            evs[existingIdx].title = newTitle;
            sEv(evs);
            updateEventInDOM(evs[existingIdx]);
          } else {
            const newEv = {id:Date.now(), date:ds, time:hora, title:newTitle, desc:"", cat:"trabajo", _ds:ds};
            evs.push(newEv);
            sEv(evs);
            addEventToDOM(newEv);
          }
        }
        const d=gD(ds);
        if(!d.hours)d.hours={};
        d.hours[hora]=newTitle;
        sD(ds,d);
      }
    });
  }
  closeDay();
  renderCal();
}
function openDay(ds,label){selDay=ds;const panel=document.getElementById('dayPanel');panel.style.display='block';const dd=gD(ds);const dayEvs=gEv().filter(e=>e._ds===ds).reduce((map,ev)=>{map[ev.time]=ev.title; return map;},{});let hrRows='';for(let h=6;h<=23;h++){const lbl=h.toString().padStart(2,'0')+':00';const val=(dd.hours||{})[lbl]||'';const eventTitle = dayEvs[lbl] || ''; const displayVal = eventTitle || val; const hasEvent = !!eventTitle;hrRows+=`<div class="hr-row"><button class="hr-lbl ${hasEvent?'highlight':''}" onclick="gotoAgendaWithTime('${ds}','${lbl}')">⏱ ${lbl}</button><input class="hr-inp" value="${displayVal.replace(/"/g,'&quot;')}" placeholder="${hasEvent?'Editar evento...':'Nota o evento...'}" /></div>`;}const cpicker=PCOLS.map(c=>`<div class="cdot${c===selPCol?' sel':''}" data-col="${c}" style="background:${c};" onclick="sPCol('${c}','${ds}','${label}')"></div>`).join('');const postits=(dd.postits||[]).map(p=>`<div class="postit" style="background:${p.color}1a;border:1px solid ${p.color}44;color:${p.color};"><button class="postit-x" onclick="delPostit('${ds}',${p.id},'${label}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>${p.text}</div>`).join('')||'<span style="font-size:11px;color:var(--tx3);">Sin notas</span>';panel.innerHTML=`<div class="day-panel"><div class="dp-head"><div class="dp-ttl">📌 ${label}</div><button class="btn btn-g btn-xs" onclick="guardarYDia('${ds}','${label}')">Guardar y cerrar</button></div><div class="lbl">Horario personal</div>${hrRows}<div style="margin-top:16px;"><div class="lbl">📝 Post-its</div><div class="postit-row"><input type="text" id="piTxt" placeholder="Nota rápida..." style="flex:1;" /><div style="display:flex;gap:5px;">${cpicker}</div><button class="btn btn-g btn-xs" onclick="addPostit('${ds}','${label}')">+ Post-it</button></div><div class="postit-grid">${postits}</div></div></div>`;renderCal();}
function gotoAgendaWithTime(dateStr, timeStr){
  const agendaTab = document.querySelector('.tab[onclick*="agenda"]');
  if(agendaTab) agendaTab.click();
  openEventEditorForDateTime(dateStr, timeStr);
}
function openEventEditorForDateTime(dateStr, timeStr){
  resetEventForm();
  const existing = gEv().find(e=>e._ds===dateStr && e.time===timeStr);
  document.getElementById('evDate').value = dateStr;
  const [hh,mm] = timeStr.split(':');
  evH = parseInt(hh); evM = parseInt(mm);
  updateEvTime();
  if(existing){
    editingEventId = existing.id;
    document.getElementById('evTitle').value = existing.title;
    document.getElementById('evDesc').value = existing.desc || '';
    document.getElementById('evCat').value = existing.cat;
    document.getElementById('saveEventBtn').textContent = 'Actualizar evento';
  } else {
    document.getElementById('evTitle').value = '';
    document.getElementById('evDesc').value = '';
    document.getElementById('evCat').value = 'trabajo';
    document.getElementById('saveEventBtn').textContent = 'Guardar evento';
  }
  if(!addEvOpen) toggleAddEvent();
}
function closeDay(){selDay=null;document.getElementById('dayPanel').style.display='none';renderCal();}
function sPCol(c,ds,label){selPCol=c;document.querySelectorAll('.cdot').forEach(d=>{d.classList.toggle('sel',d.style.background===c||d.getAttribute('data-col')===c);});}
function addPostit(ds,label){const txt=document.getElementById('piTxt').value.trim();if(!txt)return;const d=gD(ds);if(!d.postits)d.postits=[];d.postits.push({id:Date.now(),text:txt,color:selPCol});sD(ds,d);document.getElementById('piTxt').value='';openDay(ds,label);}
function delPostit(ds,id,label){const d=gD(ds);d.postits=(d.postits||[]).filter(p=>p.id!==id);sD(ds,d);openDay(ds,label);}
let addEvOpen=false;
function toggleAddEvent(){addEvOpen=!addEvOpen;const panel=document.getElementById('addEvPanel');panel.classList.toggle('open',addEvOpen);if(addEvOpen){if(!document.getElementById('evDate').value) document.getElementById('evDate').value=new Date().toISOString().split('T')[0];updateEvTime();} else { resetEventForm(); }}
function openAddEventPanel(){ resetEventForm(); toggleAddEvent(); }
function cancelEditAndClose(){ editingEventId = null; toggleAddEvent(); }
function openEditEventPanel(eventId){ const ev = gEv().find(e=>e.id===eventId); if(!ev) return; editingEventId = eventId; document.getElementById('evDate').value = ev.date; const [hh,mm] = ev.time.split(':'); evH = parseInt(hh); evM = parseInt(mm); updateEvTime(); document.getElementById('evTitle').value = ev.title; document.getElementById('evDesc').value = ev.desc || ''; document.getElementById('evCat').value = ev.cat; document.getElementById('saveEventBtn').textContent = 'Actualizar evento'; if(!addEvOpen) toggleAddEvent(); }
function resetEventForm(){ editingEventId = null; document.getElementById('evTitle').value = ''; document.getElementById('evDesc').value = ''; document.getElementById('evCat').value = 'trabajo'; document.getElementById('saveEventBtn').textContent = 'Guardar evento'; }
function addEventToDOM(event){
  const dateKey = event._ds;
  let dayBlock = document.querySelector(`.ag-day-block[data-date="${dateKey}"]`);
  if(!dayBlock){
    // create new day block
    const newBlock = createDayBlock(dateKey, [event]);
    document.getElementById('agList').appendChild(newBlock);
  } else {
    const bodyDiv = dayBlock.querySelector('.ag-day-body');
    const newCard = createEventCard(event);
    bodyDiv.appendChild(newCard);
    const countSpan = dayBlock.querySelector('.ag-day-count');
    if(countSpan){
      const currentCount = bodyDiv.querySelectorAll('.ev-card').length;
      countSpan.innerText = `${currentCount} actividad${currentCount!==1?'es':''}`;
    }
  }
}
function updateEventInDOM(event){
  const card = document.querySelector(`.ev-card[data-event-id="${event.id}"]`);
  if(card){
    card.querySelector('.ev-time').innerHTML = `⏱ ${event.time||'--:--'}`;
    card.querySelector('.ev-ttl').innerText = event.title;
    const descDiv = card.querySelector('.ev-dsc');
    if(event.desc){
      if(descDiv) descDiv.innerText = event.desc;
      else card.querySelector('.ev-info').insertAdjacentHTML('beforeend', `<div class="ev-dsc">${event.desc}</div>`);
    } else if(descDiv) descDiv.remove();
    const badgeSpan = card.querySelector('.badge');
    if(badgeSpan){
      badgeSpan.className = `badge b-${event.cat}`;
      badgeSpan.innerText = event.cat;
    }
  }
}
function deleteEventFromDOM(eventId){
  const card = document.querySelector(`.ev-card[data-event-id="${eventId}"]`);
  if(card){
    const dayBlock = card.closest('.ag-day-block');
    card.remove();
    if(dayBlock){
      const bodyDiv = dayBlock.querySelector('.ag-day-body');
      const remaining = bodyDiv.querySelectorAll('.ev-card').length;
      const countSpan = dayBlock.querySelector('.ag-day-count');
      if(countSpan) countSpan.innerText = `${remaining} actividad${remaining!==1?'es':''}`;
      if(remaining===0 && dayBlock.parentNode) dayBlock.remove();
    }
  }
}
function createEventCard(ev){
  const div = document.createElement('div');
  div.className = 'ev-card';
  div.setAttribute('data-event-id', ev.id);
  div.innerHTML = `<div class="ev-time">⏱ ${ev.time||'--:--'}</div><div class="ev-info"><div class="ev-ttl">${ev.title}</div>${ev.desc?`<div class="ev-dsc">${ev.desc}</div>`:''}<div><span class="badge b-${ev.cat}">${ev.cat}</span></div></div><div style="display:flex;gap:4px;"><button class="xbtn" onclick="openEditEventPanel(${ev.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="xbtn" onclick="delEv(${ev.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg></button></div>`;
  return div;
}
function createDayBlock(date, events){
  const block = document.createElement('div');
  block.className = 'ag-day-block';
  block.setAttribute('data-date', date);
  const formatted = fmtDate(date);
  block.innerHTML = `<div class="ag-day-head" onclick="togDayBlock(this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--pu2)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><div class="ag-day-date">${formatted}</div><div class="ag-day-count">${events.length} actividad${events.length!==1?'es':''}</div><div class="ag-day-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg></div></div><div class="ag-day-body"></div>`;
  const bodyDiv = block.querySelector('.ag-day-body');
  events.forEach(ev => bodyDiv.appendChild(createEventCard(ev)));
  return block;
}
function addOrUpdateEvent(){ 
  if(editingEventId !== null){
    const dateVal = document.getElementById('evDate').value;
    const title = document.getElementById('evTitle').value.trim();
    if(!dateVal || !title){ alert('Completa fecha y título'); return; }
    const time = document.getElementById('evTime').value || '00:00';
    const evs = gEv();
    const idx = evs.findIndex(e=>e.id===editingEventId);
    if(idx !== -1){
      evs[idx].date = dateVal;
      evs[idx].time = time;
      evs[idx].title = title;
      evs[idx].desc = document.getElementById('evDesc').value.trim();
      evs[idx].cat = document.getElementById('evCat').value;
      evs[idx]._ds = dateVal;
      sEv(evs);
      updateEventInDOM(evs[idx]);
      if(selDay === dateVal){
        const panelDiv=document.querySelector('.day-panel');
        if(panelDiv){
          const targetRow = Array.from(panelDiv.querySelectorAll('.hr-row')).find(row => row.querySelector('.hr-lbl')?.innerText.includes(time));
          if(targetRow){
            const inp = targetRow.querySelector('.hr-inp');
            if(inp) inp.value = title;
            const badge = targetRow.querySelector('.hr-lbl');
            if(badge) badge.classList.add('highlight');
          }
        }
      }
      sendPushNotif('Evento actualizado', `${title} el ${dateVal}`);
    }
  } else {
    const dateVal = document.getElementById('evDate').value;
    const title = document.getElementById('evTitle').value.trim();
    if(!dateVal || !title){ alert('Completa fecha y título'); return; }
    const time = document.getElementById('evTime').value||'00:00';
    const evs=gEv();
    const newEv = {id:Date.now(),date:dateVal,time,title,desc:document.getElementById('evDesc').value.trim(),cat:document.getElementById('evCat').value,_ds:dateVal};
    evs.push(newEv);
    sEv(evs);
    addEventToDOM(newEv);
    renderCal(); // update month view
    sendPushNotif('Evento guardado',`${title} el ${dateVal}`);
    toggleAddEvent();
  }
}
function delEv(id){
  if(!confirm('¿Eliminar evento?')) return;
  const evs = gEv();
  const newEvs = evs.filter(e=>e.id!==id);
  sEv(newEvs);
  deleteEventFromDOM(id);
  renderCal();
}
function fmtDate(ds){if(!ds)return ds;const p=ds.split('-');if(p.length!==3)return ds;return `${parseInt(p[2])} de ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;}
function renderAgenda(){
  const evs=gEv();
  const container = document.getElementById('agList');
  if(!evs.length){
    container.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Sin eventos agendados</div>';
    return;
  }
  const byDate={};
  evs.forEach(e=>{const key=e._ds||e.date; if(!byDate[key]) byDate[key]=[]; byDate[key].push(e);});
  Object.values(byDate).forEach(list=>list.sort((a,b)=>a.time<b.time?-1:1));
  const sortedDates = Object.keys(byDate).sort();
  container.innerHTML='';
  sortedDates.forEach(date=>{
    const block = createDayBlock(date, byDate[date]);
    container.appendChild(block);
  });
}
function togDayBlock(hdr){const body=hdr.nextElementSibling;const chev=hdr.querySelector('.ag-day-chev');const open=body.classList.toggle('open');chev.style.transform=open?'rotate(180deg)':'';}
const PROJ_STATUSES=['En Edición','Subido para Revisión','En revisión','Cambios solicitados','Aprobado','Subido a Plataformas'];const PROJ_STATUS_COLS={'En Edición':'#6c63b8','Subido para Revisión':'#8c6a2a','En revisión':'#2a608c','Cambios solicitados':'#8c3050','Aprobado':'#2a8c6e','Subido a Plataformas':'#3a7a6a'};
function addProject(){const title=document.getElementById('projTitle').value.trim(),date=document.getElementById('projDate').value;if(!title||!date){alert('Ingresa título y fecha');return;}const projs=gPr();const newProj={id:Date.now(),title,date,status:'En Edición'};projs.push(newProj);sPr(projs);document.getElementById('projTitle').value='';document.getElementById('projDate').value='';addProjectToDOM(newProj);}
function addProjectToDOM(proj){const col=PROJ_STATUS_COLS[proj.status]||'#6c63b8';const opts=PROJ_STATUSES.map(s=>`<option value="${s}"${proj.status===s?' selected':''}>${s}</option>`).join('');const[y,m,d]=proj.date.split('-');const dateLabel=`${parseInt(d)} ${MONTHS[parseInt(m)-1].substring(0,3)} ${y}`;const projDiv=document.createElement('div');projDiv.className='proj-entry';projDiv.style.borderLeft=`3px solid ${col}`;projDiv.setAttribute('data-proj-id',proj.id);projDiv.innerHTML=`<div class="proj-date">${dateLabel}</div><div class="proj-title" title="${proj.title}">${proj.title}</div><div class="proj-actions"><select class="proj-status-select" style="border-color:${col}55;color:${col};" onchange="updateProjectStatus(${proj.id},this.value);">${opts}</select><button class="proj-del" onclick="deleteProjectById(${proj.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/></svg></button></div></div>`;document.getElementById('projList').appendChild(projDiv);}
function updateProjectStatus(id,newStatus){const projs=gPr();const p=projs.find(p=>p.id===id);if(p){p.status=newStatus;sPr(projs);const projDiv=document.querySelector(`.proj-entry[data-proj-id="${id}"]`);if(projDiv){const col=PROJ_STATUS_COLS[newStatus]||'#6c63b8';projDiv.style.borderLeftColor=col;const select=projDiv.querySelector('.proj-status-select');if(select){select.style.borderColor=`${col}55`;select.style.color=col;select.value=newStatus;}}}}
function deleteProjectById(id){if(!confirm('¿Eliminar proyecto?'))return;const projs=gPr();const newProjs=projs.filter(p=>p.id!==id);sPr(newProjs);const projDiv=document.querySelector(`.proj-entry[data-proj-id="${id}"]`);if(projDiv) projDiv.remove();}
function renderProjects(){const projs=gPr();const el=document.getElementById('projList');if(!el)return;if(!projs.length){el.innerHTML='<div class="proj-empty">Sin proyectos aún.<br>Agrega el primer video arriba.</div>';return;}el.innerHTML='';projs.forEach(p=>addProjectToDOM(p));}
let timeMiniOpen=false;
function toggleTimeMini(){timeMiniOpen=!timeMiniOpen;document.getElementById('timeMiniPop').style.display=timeMiniOpen?'block':'none';if(timeMiniOpen){const H=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')),M=Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));makeDrum('trkEH','vpEH',H,evH,v=>{evH=v;updateEvTime();});makeDrum('trkEM','vpEM',M,evM,v=>{evM=v;updateEvTime();});}}function closeTimeMini(){timeMiniOpen=false;document.getElementById('timeMiniPop').style.display='none';}function updateEvTime(){const hh=String(evH).padStart(2,'0'),mm=String(evM).padStart(2,'0');document.getElementById('evTimeDisplay').value=hh+':'+mm;document.getElementById('evTime').value=hh+':'+mm;}
renderAlarms();renderCal();renderAgenda();renderProjects();
</script>
